<svg width="1280" height="400" viewBox="0 0 1280 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ProxMate</title>
<desc>ProxMate — your Proxmox cluster, shared like the cloud. Invite-only, per-tenant isolation, backups.</desc>
