title: "Idea: "
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: |
        Welcome to ProxMate Ideas.

        We welcome suggestions to improve ProxMate. Whether it is a new feature, a UI enhancement, or an integration, share it here.

        Please check existing discussions to see if your idea has already been proposed.
  - type: textarea
    id: concept
    attributes:
      label: Pitch your idea
      description: A clear and concise description of what you want to happen.
      placeholder: I would love to see an integration with...
    validations:
      required: true
  - type: textarea
    id: problem-solved
    attributes:
      label: What problem does this solve?
      description: Explain the use case or pain point this feature addresses.
      placeholder: Currently, when deploying a VM, I have to...
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Additional context or mockups
      description: Any other information, diagrams, mockups, or suggestions on implementation.
      placeholder: We could implement this by adding a field to the...
    validations:
      required: false
