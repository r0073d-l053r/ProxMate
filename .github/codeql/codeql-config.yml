name: ProxMate CodeQL config

# Test fixtures and e2e specs aren't shipped code — don't scan them.
paths-ignore:
  - backend/test/**
  - frontend/e2e/**
  - '**/*.test.ts'
  - '**/*.test.tsx'

query-filters:
  # `js/insufficient-password-hash` flags fast hashing of "passwords". ProxMate
  # hashes real passwords with bcrypt (see auth.service / bcryptjs); the only
  # SHA-256 hashing is of HIGH-ENTROPY secrets — API tokens, password-reset
  # tokens, 2FA recovery codes — which must be a *deterministic* hash so they can
  # be looked up by value (a salted KDF can't). A fast hash of a 192-bit random
  # secret is correct and standard (GitHub/Stripe do the same), so this query
  # only produces false positives here.
  - exclude:
      id: js/insufficient-password-hash
