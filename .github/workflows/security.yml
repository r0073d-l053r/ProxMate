name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so newly-disclosed advisories surface even without a push.
    - cron: '17 6 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Report known-vulnerable dependencies. `|| true` keeps a single advisory
      # from blocking unrelated PRs — review the surfaced report instead.
      - name: Audit backend
        run: cd backend && npm audit --audit-level=high || true
      - name: Audit frontend
        run: cd frontend && npm audit --audit-level=high || true

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Trivy vulnerability + secret scan
        # report, don't fail the build on third-party advisories (exit-code 0)
        run: trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 --no-progress .

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: proxmate-sbom.cyclonedx.json
