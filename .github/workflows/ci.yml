name: CI

on:
  push:
    # Run on all *branch* pushes but not on tags. Filtering on `branches` (rather
    # than `tags-ignore`) is what actually excludes tags: in GitHub Actions, a
    # `push` trigger that specifies only tag filters stops firing on branch pushes
    # altogether. release.yml handles tag pushes, and the merge-commit run already
    # validated the exact code a release tag points at — so re-running the full CI
    # on the tag was redundant work that gave transient flakes a second chance.
    branches:
      - "**"
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit + integration tests
        run: npm test

  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Console/API URL is resolved against window.location at runtime; this is
      # only the build-time default. Keep it relative so the build is portable.
      NEXT_PUBLIC_API_URL: /api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build (Next 16 / Turbopack — also typechecks)
        run: npm run build

  e2e:
    name: Frontend — Playwright smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: /api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        # Retry the browser download: it pulls from external mirrors (e.g. Google's
        # apt repo) that occasionally serve a mid-sync file ("unexpected size"), a
        # transient infra flake unrelated to the code under test.
        run: |
          for attempt in 1 2 3; do
            if npx playwright install --with-deps chromium; then
              exit 0
            fi
            echo "::warning::Playwright browser install failed (attempt $attempt/3); retrying in 15s…"
            sleep 15
          done
          echo "::error::Playwright browser install failed after 3 attempts"
          exit 1
      - name: Run smoke tests
        run: npm run e2e

  docker:
    name: Docker — build both images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: false
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
