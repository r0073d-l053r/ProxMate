name: Release

# Publishes a GitHub Release whenever a version tag is pushed, so ProxMate's
# in-app "Check for updates" (which reads the latest published release) has a
# "Latest" to find. Cutting a release is then just:
#
#   1. bump "version" in backend/package.json (e.g. 0.2.0)
#   2. git commit -am "release: v0.2.0"
#   3. git tag v0.2.0 && git push origin main --tags
#
# This workflow turns step 3 into a published release with auto-generated notes.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
